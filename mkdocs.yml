site_name: AgentPack Documentation
site_url: https://vedant1202.github.io/agentpack/

theme:
  name: material
  palette:
    scheme: slate

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.snippets

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]

nav:
  - Home: index.md
  - Architecture & Internals: architecture.md
  - Knowledge Map: knowledge-map.md
  - CLI Reference: cli-reference.md
  - Corpus Explorer UI: corpus-explorer-ui.md
  - Benchmark: benchmark.md
  - API Reference:
    - Core: api/core.md
    - Parsers: api/parsers.md
